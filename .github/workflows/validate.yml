# Validate Copilot template configuration files
#
# This workflow checks that required CoPilot template files exist and are valid.
# Customize the checks based on your project requirements.

name: Validate Config

on:
  push:
    paths:
      - '.github/copilot-instructions.md'
      - 'AGENTS.md'
      - '.github/prompts/**'
      - '.github/instructions/**'
  pull_request:
    paths:
      - '.github/copilot-instructions.md'
      - 'AGENTS.md'
      - '.github/prompts/**'
      - '.github/instructions/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          echo "Checking required Copilot template files..."

          missing=0

          for file in .github/copilot-instructions.md AGENTS.md; do
            if [ ! -f "$file" ]; then
              echo "::error::Missing required file: $file"
              missing=1
            else
              echo "✓ $file exists"
            fi
          done

          if [ $missing -eq 1 ]; then
            exit 1
          fi

      - name: Check prompt files exist
        run: |
          echo "Checking prompt files..."

          for file in .github/prompts/brain.prompt.md .github/prompts/commit.prompt.md; do
            if [ ! -f "$file" ]; then
              echo "::warning::Missing prompt file: $file"
            else
              echo "✓ $file exists"
            fi
          done

      - name: Check for secrets in instructions
        run: |
          echo "Scanning for potential secrets..."

          patterns="password|secret|api_key|apikey|token|credential"

          if grep -iE "$patterns" .github/copilot-instructions.md AGENTS.md 2>/dev/null | grep -v "^#"; then
            echo "::warning::Potential secrets found. Please review."
          else
            echo "✓ No obvious secrets detected"
          fi
